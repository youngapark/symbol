<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반짝반짝 키보드 탐험대</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Jua', sans-serif;
            background-color: #fdf2f8;
            overflow: hidden;
            user-select: none;
        }
        .target-key-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .target-char {
            font-size: 9rem;
            line-height: 1;
            filter: drop-shadow(0 6px 0 rgba(0,0,0,0.1));
        }
        .target-name {
            font-size: 3.5rem;
            background: #ffffff;
            padding: 10px 30px;
            border-radius: 30px;
            box-shadow: 0 4px 0 #fbcfe8;
            color: #db2777;
        }
        /* 키보드 힌트 이미지 스타일 개선 */
        .keyboard-key {
            width: 110px;
            height: 110px;
            background: white;
            border: 5px solid #e5e7eb;
            border-radius: 20px;
            box-shadow: 0 8px 0 #d1d5db;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            padding: 8px;
            position: relative;
            transition: all 0.2s;
        }
        /* 위/아래 구분선 추가 */
        .keyboard-key::after {
            content: '';
            position: absolute;
            left: 20%;
            right: 20%;
            top: 50%;
            height: 1px;
            background: #f3f4f6;
        }
        .keyboard-key.active-top { border-color: #ec4899; box-shadow: 0 8px 0 #db2777; background: #fff1f2; }
        .keyboard-key.active-bottom { border-color: #06b6d4; box-shadow: 0 8px 0 #0891b2; background: #ecfeff; }
        
        .shift-badge {
            background: linear-gradient(to right, #f43f5e, #fb7185);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.8rem;
            box-shadow: 0 4px 15px rgba(244, 63, 94, 0.4);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="game-screen" class="bg-white rounded-[50px] shadow-2xl p-10 w-full max-w-3xl text-center border-[15px] border-pink-100 relative">
        
        <!-- Progress Bar -->
        <div class="flex justify-between items-center mb-8">
            <span id="stage-counter" class="text-2xl text-pink-500">모험 1 / 34</span>
            <div class="flex-grow mx-6 bg-pink-50 h-6 rounded-full overflow-hidden border-2 border-pink-200">
                <div id="progress-bar" class="bg-gradient-to-right from-pink-400 to-rose-400 h-full transition-all duration-500" style="width: 0%"></div>
            </div>
            <div id="score" class="text-2xl text-yellow-500">⭐ 0</div>
        </div>

        <!-- Question Area -->
        <div id="main-content">
            <h2 id="instruction-text" class="text-3xl text-gray-600 mb-6">아래 키를 찾아보세요!</h2>
            
            <div class="flex flex-col items-center space-y-10">
                <!-- Large Display -->
                <div id="display-group" class="target-key-container">
                    <span id="target-char" class="target-char text-pink-600">1</span>
                    <span id="target-name" class="target-name">숫자 일</span>
                </div>

                <!-- Shift Warning -->
                <div id="shift-area" class="invisible h-12">
                    <div class="shift-badge font-bold">
                        ⚠️ [Shift] 키를 누른 채로 눌러주세요!
                    </div>
                </div>

                <!-- Visual Guide -->
                <div class="flex items-center space-x-8 bg-gray-50 p-8 rounded-[40px] w-full">
                    <div id="kb-visual" class="keyboard-key flex-shrink-0">
                        <!-- 기본 글자색을 더 진하게 설정 (#4b5563) -->
                        <span id="kb-top" class="text-3xl text-gray-600">!</span>
                        <span id="kb-bottom" class="text-3xl text-gray-600">1</span>
                    </div>
                    <div class="text-left flex-grow">
                        <p id="key-desc" class="text-2xl text-gray-600 leading-snug">숫자를 셀 때 쓰는 키예요.</p>
                        <div class="mt-2 flex items-center gap-3">
                            <span class="bg-white px-3 py-1 rounded-lg text-sm text-pink-400 border border-pink-200">영어: <span id="name-en">One</span></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Feedback Msg -->
        <div id="feedback" class="mt-8 h-12 text-3xl font-bold"></div>
    </div>

    <!-- Start Overlay -->
    <div id="start-overlay" class="fixed inset-0 bg-pink-50 flex items-center justify-center z-50">
        <div class="bg-white p-16 rounded-[60px] text-center max-w-xl shadow-2xl border-8 border-white outline outline-8 outline-pink-200">
            <div class="text-9xl mb-8">🎲</div>
            <h1 class="text-6xl mb-6 text-pink-500">랜덤 키보드 탐험</h1>
            <p class="text-2xl text-gray-500 mb-12 leading-relaxed">
                어떤 키가 나올지 맞춰볼까요?<br>
                키 하나에 두 개의 글자가 살고 있어요!
            </p>
            <button onclick="startGame()" class="bg-pink-500 hover:bg-pink-600 text-white text-4xl px-20 py-6 rounded-full shadow-xl transform transition hover:scale-110 active:scale-95">
                시작하기!
            </button>
        </div>
    </div>

    <script>
        const originalQuestData = [
            // 숫자 1-0 세트
            { target: '1', top: '!', bottom: '1', type: 'num', kr: '숫자 일', en: 'One', desc: '하나를 뜻하는 숫자예요.', key: '1' },
            { target: '2', top: '@', bottom: '2', type: 'num', kr: '숫자 이', en: 'Two', desc: '둘을 뜻하는 숫자예요.', key: '2' },
            { target: '3', top: '#', bottom: '3', type: 'num', kr: '숫자 삼', en: 'Three', desc: '셋을 뜻하는 숫자예요.', key: '3' },
            { target: '4', top: '$', bottom: '4', type: 'num', kr: '숫자 사', en: 'Four', desc: '넷을 뜻하는 숫자예요.', key: '4' },
            { target: '5', top: '%', bottom: '5', type: 'num', kr: '숫자 오', en: 'Five', desc: '다섯을 뜻하는 숫자예요.', key: '5' },
            { target: '6', top: '^', bottom: '6', type: 'num', kr: '숫자 육', en: 'Six', desc: '여섯을 뜻하는 숫자예요.', key: '6' },
            { target: '7', top: '&', bottom: '7', type: 'num', kr: '숫자 칠', en: 'Seven', desc: '일곱을 뜻하는 숫자예요.', key: '7' },
            { target: '8', top: '*', bottom: '8', type: 'num', kr: '숫자 팔', en: 'Eight', desc: '여덟을 뜻하는 숫자예요.', key: '8' },
            { target: '9', top: '(', bottom: '9', type: 'num', kr: '숫자 구', en: 'Nine', desc: '아홉을 뜻하는 숫자예요.', key: '9' },
            { target: '0', top: ')', bottom: '0', type: 'num', kr: '숫자 영', en: 'Zero', desc: '아무것도 없음을 뜻하는 영이에요.', key: '0' },
            
            // 숫자 키 위 특수기호 세트
            { target: '!', top: '!', bottom: '1', type: 'shf', kr: '느낌표', en: 'Exclamation', desc: '강조하거나 놀랄 때 문장 끝에 써요.', key: '!' },
            { target: '@', top: '@', bottom: '2', type: 'shf', kr: '골뱅이', en: 'At sign', desc: '이메일 주소에 꼭 들어가는 기호예요.', key: '@' },
            { target: '#', top: '#', bottom: '3', type: 'shf', kr: '우물 정', en: 'Hash', desc: '번호를 매기거나 강조할 때 써요.', key: '#' },
            { target: '$', top: '$', bottom: '4', type: 'shf', kr: '달러', en: 'Dollar', desc: '돈을 나타낼 때 쓰는 기호예요.', key: '$' },
            { target: '%', top: '%', bottom: '5', type: 'shf', kr: '퍼센트', en: 'Percent', desc: '비율이나 양을 나타낼 때 써요.', key: '%' },
            { target: '^', top: '^', bottom: '6', type: 'shf', kr: '웃음', en: 'Caret', desc: '수학 기호나 웃는 눈 모양으로 써요.', key: '^' },
            { target: '&', top: '&', bottom: '7', type: 'shf', kr: '앤드', en: 'Ampersand', desc: '"그리고"라는 뜻을 가진 기호예요.', key: '&' },
            { target: '*', top: '*', bottom: '8', type: 'shf', kr: '별표', en: 'Asterisk', desc: '곱하기를 할 때나 별 모양 기호예요.', key: '*' },
            { target: '(', top: '(', bottom: '9', type: 'shf', kr: '여는 괄호', en: 'Open Paren', desc: '글자를 묶어줄 때 시작하는 기호예요.', key: '(' },
            { target: ')', top: ')', bottom: '0', type: 'shf', kr: '닫는 괄호', en: 'Close Paren', desc: '글자 묶음을 끝낼 때 사용하는 기호예요.', key: ')' },

            // 추가 특수 기호 세트 (병행 키)
            { target: '?', top: '?', bottom: '/', type: 'shf', kr: '물음표', en: 'Question', desc: '궁금할 때 문장 끝에 쓰는 기호예요.', key: '?' },
            { target: '/', top: '?', bottom: '/', type: 'num', kr: '슬래시', en: 'Slash', desc: '나누기를 하거나 날짜를 쓸 때 써요.', key: '/' },
            { target: '_', top: '_', bottom: '-', type: 'shf', kr: '언더바', en: 'Underscore', desc: '글자 아래에 긋는 긴 선이에요.', key: '_' },
            { target: '-', top: '_', bottom: '-', type: 'num', kr: '빼기', en: 'Minus', desc: '숫자를 뺄 때 사용하는 기호예요.', key: '-' },
            { target: '+', top: '+', bottom: '=', type: 'shf', kr: '더하기', en: 'Plus', desc: '숫자를 더할 때 사용하는 기호예요.', key: '+' },
            { target: '=', top: '+', bottom: '=', type: 'num', kr: '같음', en: 'Equal', desc: '양쪽이 똑같다는 뜻의 기호예요.', key: '=' },
            { target: '<', top: '<', bottom: ',', type: 'shf', kr: '왼쪽 꺽쇠', en: 'Less Than', desc: '왼쪽이 더 작다는 뜻이에요.', key: '<' },
            { target: '>', top: '>', bottom: '.', type: 'shf', kr: '오른쪽 꺽쇠', en: 'Greater Than', desc: '오른쪽이 더 크다는 뜻이에요.', key: '>' },
            { target: ',', top: '<', bottom: ',', type: 'num', kr: '쉼표', en: 'Comma', desc: '잠시 쉴 때 찍는 기호예요.', key: ',' },
            { target: '.', top: '>', bottom: '.', type: 'num', kr: '마침표', en: 'Period', desc: '문장을 마칠 때 찍는 점이에요.', key: '.' },
            
            // 방향키 세트
            { target: '↑', top: '↑', bottom: '방향', type: 'arrow', kr: '위쪽 방향키', en: 'Up Arrow', desc: '캐릭터를 위로 움직여요.', key: 'ArrowUp' },
            { target: '↓', top: '↓', bottom: '방향', type: 'arrow', kr: '아래쪽 방향키', en: 'Down Arrow', desc: '캐릭터를 아래로 움직여요.', key: 'ArrowDown' },
            { target: '←', top: '←', bottom: '방향', type: 'arrow', kr: '왼쪽 방향키', en: 'Left Arrow', desc: '캐릭터를 왼쪽으로 움직여요.', key: 'ArrowLeft' },
            { target: '→', top: '→', bottom: '방향', type: 'arrow', kr: '오른쪽 방향키', en: 'Right Arrow', desc: '캐릭터를 오른쪽으로 움직여요.', key: 'ArrowRight' }
        ];

        let questData = [];
        let currentIdx = 0;
        let isWaiting = false;
        let score = 0;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startGame() {
            questData = shuffleArray([...originalQuestData]);
            currentIdx = 0;
            score = 0;
            document.getElementById('score').innerText = `⭐ 0`;
            document.getElementById('start-overlay').classList.add('hidden');
            loadStage();
        }

        function loadStage() {
            if (currentIdx >= questData.length) {
                finishGame();
                return;
            }

            const data = questData[currentIdx];
            document.getElementById('stage-counter').innerText = `모험 ${currentIdx + 1} / ${questData.length}`;
            document.getElementById('progress-bar').style.width = `${(currentIdx / questData.length) * 100}%`;
            
            document.getElementById('target-char').innerText = data.target;
            document.getElementById('target-name').innerText = data.kr;
            document.getElementById('name-en').innerText = data.en;
            document.getElementById('key-desc').innerText = data.desc;

            const targetEl = document.getElementById('target-char');
            const shiftArea = document.getElementById('shift-area');
            const kbVisual = document.getElementById('kb-visual');
            const kbTop = document.getElementById('kb-top');
            const kbBottom = document.getElementById('kb-bottom');

            // 기본 색상 설정 (진한 회색으로 개선)
            kbTop.style.color = '#4b5563'; 
            kbBottom.style.color = '#4b5563';
            kbTop.style.fontWeight = 'normal';
            kbBottom.style.fontWeight = 'normal';

            if (data.type === 'shf') {
                targetEl.style.color = '#db2777';
                shiftArea.classList.remove('invisible');
                kbVisual.className = 'keyboard-key active-top';
                kbTop.style.color = '#db2777'; // 강조 색상
                kbTop.style.fontWeight = 'bold';
                document.getElementById('instruction-text').innerText = "특수문자를 찾아보세요!";
            } else if (data.type === 'num') {
                targetEl.style.color = '#0891b2';
                shiftArea.classList.add('invisible');
                kbVisual.className = 'keyboard-key active-bottom';
                kbBottom.style.color = '#0891b2'; // 강조 색상
                kbBottom.style.fontWeight = 'bold';
                document.getElementById('instruction-text').innerText = "숫자나 기호키를 눌러보세요!";
            } else {
                targetEl.style.color = '#ca8a04';
                shiftArea.classList.add('invisible');
                kbVisual.className = 'keyboard-key';
                kbTop.style.color = '#ca8a04';
                kbBottom.style.color = '#ca8a04';
                document.getElementById('instruction-text').innerText = "방향키를 눌러보세요!";
            }

            kbTop.innerText = data.top;
            kbBottom.innerText = data.bottom;
            document.getElementById('feedback').innerText = "";
            isWaiting = true;
        }

        window.addEventListener('keydown', (e) => {
            if (!isWaiting) return;

            const data = questData[currentIdx];
            if (e.key === data.key) {
                isWaiting = false;
                score += 10;
                document.getElementById('score').innerText = `⭐ ${score}`;
                showFeedback(true);
                setTimeout(() => {
                    currentIdx++;
                    loadStage();
                }, 800);
            } else if (e.key !== 'Shift') {
                showFeedback(false);
            }
        });

        function showFeedback(correct) {
            const fb = document.getElementById('feedback');
            if (correct) {
                fb.innerText = "✨ 딩동댕! 아주 잘했어요! ✨";
                fb.style.color = "#ec4899";
            } else {
                fb.innerText = "다시 한 번 찾아볼까요? 😊";
                fb.style.color = "#f59e0b";
            }
        }

        function finishGame() {
            document.getElementById('game-screen').innerHTML = `
                <div class="py-12">
                    <div class="text-[12rem] mb-8">🏆</div>
                    <h2 class="text-7xl text-pink-500 mb-6">모험 성공!</h2>
                    <p class="text-3xl text-gray-600 mb-10">모든 키보드 친구들을 찾아냈어요!</p>
                    <div class="bg-yellow-50 inline-block px-12 py-6 rounded-full border-4 border-yellow-200 mb-12">
                        <span class="text-4xl text-yellow-600">최종 점수: ${score}점</span>
                    </div>
                    <br>
                    <button onclick="location.reload()" class="bg-cyan-500 hover:bg-cyan-600 text-white text-4xl px-20 py-6 rounded-full shadow-xl">
                        다시 시작하기
                    </button>
                </div>
            `;
        }
    </script>
</body>
</html>
